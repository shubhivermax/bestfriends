<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Fiji</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .fiji-scene {
        position: relative;
        width: min(100%, 640px);
        height: 360px;
        border-radius: 28px;
        overflow: hidden;
        border: 5px solid rgba(255, 255, 255, 0.45);
        box-shadow: var(--shadow-soft);
        background: linear-gradient(
          180deg,
          #ff9ec8 0%,
          #ffb085 35%,
          #ffd89b 55%,
          #4fc3f7 55%,
          #0288d1 100%
        );
      }
      .fiji-sun-glow {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fffde7, #ffeb3b 45%, #ff9800);
        box-shadow: 0 0 50px rgba(255, 220, 120, 0.95);
        animation: pulse-sun 4s ease-in-out infinite;
      }
      @keyframes pulse-sun {
        0%,
        100% {
          transform: translateX(-50%) scale(1);
        }
        50% {
          transform: translateX(-50%) scale(1.06);
        }
      }
      .fiji-palm {
        position: absolute;
        bottom: 0;
        width: 80px;
        height: 120px;
        background: repeating-linear-gradient(
          90deg,
          #2e7d32,
          #2e7d32 8px,
          #1b5e20 8px,
          #1b5e20 16px
        );
        clip-path: polygon(40% 100%, 45% 40%, 50% 35%, 55% 40%, 60% 100%);
        opacity: 0.85;
      }
      .fiji-palm--l {
        left: 8%;
      }
      .fiji-palm--r {
        right: 8%;
        transform: scaleX(-1);
      }
      .fiji-boat {
        position: absolute;
        bottom: 38%;
        left: 20%;
        width: 48px;
        height: 14px;
        background: #5d4037;
        border-radius: 4px;
        animation: drift 10s linear infinite;
      }
      @keyframes drift {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(220px);
        }
      }
    </style>
  </head>
  <body class="crt">
    <script src="js/auth.js"></script>
    <script>
      LNS.requireAuth();
    </script>
    <div class="hearts-bg" aria-hidden="true"></div>
    <nav class="site-nav">
      <a href="experience.html">← hub</a>
      <a href="letters.html">letters</a>
      <a href="memory.html">memories</a>
    </nav>
    <main class="page page--fiji">
      <h1 class="page-title" style="color: #1a237e; text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5)">
        Virtual Fiji
      </h1>
      <div class="fiji-scene" aria-hidden="true">
        <div class="fiji-sun-glow"></div>
        <div class="fiji-palm fiji-palm--l"></div>
        <div class="fiji-palm fiji-palm--r"></div>
        <div class="fiji-boat"></div>
      </div>
      <div class="fiji-card" style="margin-top: 24px">
        <p>
          If we can't teleport yet, this is the next best thing: same sunset, different browser tab.
          Save a real trip for the reunion episode.
        </p>
      </div>
    </main>
    <footer class="site-footer">ocean.wav not included · imagination required</footer>
    <script src="js/hearts.js"></script>
  </body>
</html>
