<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome — Late Night Show</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="crt">
    <script src="js/auth.js"></script>
    <script>
      LNS.requireAuth();
    </script>
    <div class="hearts-bg" aria-hidden="true"></div>
    <nav class="site-nav">
      <a href="welcome.html">welcome</a>
      <a href="experience.html">experience</a>
      <a href="memory.html">memories</a>
      <a href="index.html">lock</a>
    </nav>
    <main class="page page--welcome">
      <div class="welcome-card card card--white pattern-gingham">
        <div class="welcome-header">
          Welcome to the official Late Night Show w/ Shubhi and Archi website!
        </div>
        <div class="welcome-stage">
          <div class="welcome-char welcome-char--left" aria-hidden="true">
            <img src="assets/shubhi-pixel.png" alt="" width="100%" height="auto" />
          </div>
          <div class="welcome-char welcome-char--right" aria-hidden="true">
            <img src="assets/archi-pixel.png" alt="" width="100%" height="auto" />
          </div>
          <button type="button" class="btn-pill welcome-cta" id="join-btn">
            Press Enter to Join the Experience!
          </button>
        </div>
      </div>
      <p class="muted" style="margin-top: 16px; max-width: 28em; text-align: center">
        Tip: click the button or press Enter on your keyboard.
      </p>
    </main>
    <footer class="site-footer">made with pixelated love · 2026</footer>
    <script src="js/hearts.js"></script>
    <script>
      (function () {
        function go() {
          window.location.href = "experience.html";
        }
        document.getElementById("join-btn").addEventListener("click", go);
        document.addEventListener("keydown", function (e) {
          if (e.key !== "Enter") return;
          var tag = (e.target && e.target.tagName) || "";
          if (tag === "INPUT" || tag === "TEXTAREA") return;
          go();
        });
      })();
    </script>
  </body>
</html>
